<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSSF Eligibility Check System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #3498db;
        }

        .form-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .required {
            color: #e74c3c;
        }

        .submit-btn {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
        }

        .submit-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            margin-top: 30px;
            padding: 30px;
            border-radius: 15px;
            display: none;
        }

        .result-approved {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            border-left: 5px solid #1e8449;
        }

        .result-rejected {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border-left: 5px solid #922b21;
        }

        .result-title {
            font-size: 2em;
            margin-bottom: 15px;
            text-align: center;
        }

        .result-details {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .result-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
        }

        .result-item strong {
            display: block;
            margin-bottom: 5px;
        }

        .violations-list {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .violations-list h4 {
            margin-bottom: 10px;
            color: #fff;
        }

        .violations-list ul {
            list-style: none;
            padding-left: 0;
        }

        .violations-list li {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .violations-list li:last-child {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .status-indicators {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .status-indicator {
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            text-align: center;
            min-width: 120px;
        }

        .status-online {
            background: #27ae60;
            color: white;
        }

        .status-offline {
            background: #e74c3c;
            color: white;
        }

        .confidence-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12 0%, #f1c40f 100%);
            transition: width 0.5s ease;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ NSSF Eligibility Check System</h1>
            <p>Advanced AI-Powered Eligibility Assessment</p>
            <div class="status-indicators">
                <div class="status-indicator" id="apiStatus">
                    <span id="statusText">Checking API...</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2>📋 Eligibility Assessment Form</h2>
                <form id="eligibilityForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nssf_number">NSSF Number <span class="required">*</span></label>
                            <input type="text" id="nssf_number" name="nssf_number" required placeholder="Enter NSSF Number">
                        </div>

                        <div class="form-group">
                            <label for="age">Age <span class="required">*</span></label>
                            <input type="number" id="age" name="age" required min="18" max="100" placeholder="Enter age">
                        </div>

                        <div class="form-group">
                            <label for="statement_cleanliness">Statement Cleanliness (%)</label>
                            <input type="number" id="statement_cleanliness" name="statement_cleanliness" min="0" max="100" placeholder="0-100">
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="name_match_score" name="name_match_score">
                                <label for="name_match_score">Name Match Verified</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="biometric_match" name="biometric_match">
                                <label for="biometric_match">Biometric Verification Passed</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="has_bank_details" name="has_bank_details">
                                <label for="has_bank_details">Has Bank Account Details</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="has_id_document" name="has_id_document">
                                <label for="has_id_document">Has Valid ID Document</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="has_photograph" name="has_photograph">
                                <label for="has_photograph">Has Photograph</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="parent_name_match" name="parent_name_match">
                                <label for="parent_name_match">Parent Name Match</label>
                            </div>
                        </div>
                    </div>

                    <div style="text-align: center; margin-top: 30px;">
                        <button type="submit" class="submit-btn" id="submitBtn">
                            🔍 Check Eligibility
                        </button>
                    </div>
                </form>
            </div>

            <div class="loading" id="loadingSection" style="display: none;">
                <div class="spinner"></div>
                <p>Processing eligibility check...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="result-section" id="resultSection">
                <div class="result-title" id="resultTitle"></div>
                <div class="result-details">
                    <div class="result-grid">
                        <div class="result-item">
                            <strong>Eligibility Score:</strong>
                            <span id="eligibilityScore"></span>
                            <div class="confidence-bar">
                                <div class="confidence-fill" id="confidenceFill"></div>
                            </div>
                        </div>
                        <div class="result-item">
                            <strong>Confidence Level:</strong>
                            <span id="confidenceLevel"></span>
                        </div>
                        <div class="result-item">
                            <strong>Decision Reason:</strong>
                            <span id="decisionReason"></span>
                        </div>
                        <div class="result-item">
                            <strong>Processing Time:</strong>
                            <span id="processingTime"></span>
                        </div>
                    </div>
                    <div class="violations-list" id="violationsList" style="display: none;">
                        <h4>❌ Requirement Violations:</h4>
                        <ul id="violationsUl"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:5000';
        
        // Global variables
        let isApiOnline = false;
        let startTime = null;

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            checkApiStatus();
            setupFormHandlers();
            setupValidation();
        });

        // Check API status
        async function checkApiStatus() {
            const statusIndicator = document.getElementById('apiStatus');
            const statusText = document.getElementById('statusText');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                if (response.ok && data.status === 'healthy') {
                    statusIndicator.className = 'status-indicator status-online';
                    statusText.textContent = '✅ API Online';
                    isApiOnline = true;
                } else {
                    throw new Error('API not healthy');
                }
            } catch (error) {
                statusIndicator.className = 'status-indicator status-offline';
                statusText.textContent = '❌ API Offline';
                isApiOnline = false;
                console.error('API Status Check Failed:', error);
            }
        }

        // Setup form handlers
        function setupFormHandlers() {
            const form = document.getElementById('eligibilityForm');
            form.addEventListener('submit', handleFormSubmit);
        }

        // Setup form validation
        function setupValidation() {
            const nssfInput = document.getElementById('nssf_number');
            const ageInput = document.getElementById('age');
            
            nssfInput.addEventListener('input', function() {
                // Basic NSSF number validation
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value.length > 15) {
                    this.value = this.value.slice(0, 15);
                }
            });

            ageInput.addEventListener('input', function() {
                if (this.value < 18) {
                    this.setCustomValidity('Age must be at least 18');
                } else if (this.value > 100) {
                    this.setCustomValidity('Age must be less than 100');
                } else {
                    this.setCustomValidity('');
                }
            });
        }

        // Handle form submission
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            if (!isApiOnline) {
                showError('API is currently offline. Please try again later.');
                return;
            }

            const formData = collectFormData();
            if (!formData) return;

            showLoading();
            startTime = Date.now();

            try {
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();
                
                if (response.ok && result.success) {
                    showResult(result.data);
                } else {
                    throw new Error(result.error || 'Prediction failed');
                }
            } catch (error) {
                showError(`Error: ${error.message}`);
                console.error('Prediction Error:', error);
            } finally {
                hideLoading();
            }
        }

        // Collect form data
        function collectFormData() {
            const form = document.getElementById('eligibilityForm');
            const formData = new FormData(form);
            
            const data = {};
            
            // Required fields
            data.nssf_number = formData.get('nssf_number');
            data.age = parseFloat(formData.get('age'));
            
            if (!data.nssf_number || !data.age) {
                showError('Please fill in all required fields');
                return null;
            }

            // Optional fields
            data.statement_cleanliness = parseFloat(formData.get('statement_cleanliness')) || 0;
            
            // Checkboxes
            data.biometric_match = formData.get('biometric_match') ? 1 : 0;
            data.has_bank_details = formData.get('has_bank_details') ? 1 : 0;
            data.has_id_document = formData.get('has_id_document') ? 1 : 0;
            data.has_photograph = formData.get('has_photograph') ? 1 : 0;
            data.name_match_score = formData.get('name_match_score') ? 1 : 0;
            data.parent_name_match = formData.get('parent_name_match') ? 1 : 0;

            return data;
        }

        // Show loading state
        function showLoading() {
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
        }

        // Hide loading state
        function hideLoading() {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }

        // Show result
        function showResult(data) {
            const resultSection = document.getElementById('resultSection');
            const resultTitle = document.getElementById('resultTitle');
            const processingTime = startTime ? `${Date.now() - startTime}ms` : 'N/A';
            
            // Set result class and title
            if (data.decision === 'APPROVED') {
                resultSection.className = 'result-section result-approved';
                resultTitle.textContent = '✅ ELIGIBILITY APPROVED';
            } else {
                resultSection.className = 'result-section result-rejected';
                resultTitle.textContent = '❌ ELIGIBILITY REJECTED';
            }

            // Fill in result details
            document.getElementById('eligibilityScore').textContent = `${data.eligibility_score.toFixed(2)}%`;
            document.getElementById('confidenceLevel').textContent = `${data.confidence.toFixed(2)}%`;
            document.getElementById('decisionReason').textContent = data.reason;
            document.getElementById('processingTime').textContent = processingTime;

            // Set confidence bar
            const confidenceFill = document.getElementById('confidenceFill');
            confidenceFill.style.width = `${data.confidence}%`;

            // Show violations if any
            if (data.violations && data.violations.length > 0) {
                const violationsList = document.getElementById('violationsList');
                const violationsUl = document.getElementById('violationsUl');
                
                violationsUl.innerHTML = '';
                data.violations.forEach(violation => {
                    const li = document.createElement('li');
                    li.textContent = violation;
                    violationsUl.appendChild(li);
                });
                
                violationsList.style.display = 'block';
            } else {
                document.getElementById('violationsList').style.display = 'none';
            }

            // Hide error and show result
            document.getElementById('errorMessage').style.display = 'none';
            resultSection.style.display = 'block';
            
            // Scroll to result
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Periodic API status check
        setInterval(checkApiStatus, 30000); // Check every 30 seconds
    </script>
</body>
</html>
